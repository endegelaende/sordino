# ──────────────────────────────────────────────────────────────────────────────
# Sordino — Continuous Integration
#
# Runs mypy strict type-checking on every push and PR.
# Tests will be re-added once the test suite has been reworked.
#
# Matrix: Python 3.10 – 3.13 × Ubuntu + Windows
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # mypy strict type-checking
  # ────────────────────────────────────────────────────────────────────────
  typecheck:
    name: "mypy strict / Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pygame-ce>=2.5.0 mypy>=1.0

      - name: Run mypy --strict
        run: |
          python -m mypy jive/ --strict

  # ────────────────────────────────────────────────────────────────────────
  # Import smoke test — verify the package can be imported
  # ────────────────────────────────────────────────────────────────────────
  import-check:
    name: "Import check / Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Sordino
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pygame-ce>=2.5.0
          python -m pip install -e .

      - name: Verify import and version
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -c "import jive; print(f'jive {jive.__version__}')"
          python -c "from jive.main import main; print('Entry point OK')"
          python -m sordino --version || sordino --version

  # ────────────────────────────────────────────────────────────────────────
  # Summary job — single check for branch protection rules
  # ────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: All checks pass
    needs: [typecheck, import-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "::error::mypy strict type-checking failed."
            exit 1
          fi
          if [ "${{ needs.import-check.result }}" != "success" ]; then
            echo "::error::Import check failed on some configurations."
            exit 1
          fi
          echo "All checks passed."
